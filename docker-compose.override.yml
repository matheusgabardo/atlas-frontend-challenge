# Dev local: builda a imagem em vez de puxar do GHCR (carregado automaticamente pelo docker compose).
services:
  app:
    build: .
    pull_policy: build # sempre usar a imagem buildada local, nunca tentar pull
    container_name: quemfazeventos-dev
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
