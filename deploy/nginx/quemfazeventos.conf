# QuemFaz Eventos — reverse proxy do Nginx para o container Nuxt (127.0.0.1:3000).
# Vai para /etc/nginx/sites-available/quemfazeventos no servidor (symlink em sites-enabled).
#
# A Cloudflare faz o TLS de borda (browser↔CF). Aqui (CF↔origem) usamos um cert
# self-signed na 443, então o SSL/TLS mode na Cloudflare deve ser "Full" (não Strict).
# Passo recomendado depois: trocar pelo Cloudflare Origin Certificate e usar Full (Strict).

# --- HTTP (porta 80): acesso direto por IP / teste; a Cloudflare em Full usa a 443 ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name quemfazeventos.com.br www.quemfazeventos.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# --- HTTPS (porta 443): é por aqui que a Cloudflare (modo Full) fala com a origem ---
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name quemfazeventos.com.br www.quemfazeventos.com.br;

    ssl_certificate     /etc/nginx/ssl/quemfazeventos.crt;
    ssl_certificate_key /etc/nginx/ssl/quemfazeventos.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
