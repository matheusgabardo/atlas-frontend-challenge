# QuemFaz Eventos — reverse proxy do Nginx para o container Nuxt (127.0.0.1:3000).
# Vai para /etc/nginx/sites-available/quemfazeventos no servidor (symlink em sites-enabled).
# O TLS é adicionado depois (Cloudflare Origin Cert ou Certbot), conforme docs/adr/0008.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name quemfazeventos.com.br www.quemfazeventos.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
