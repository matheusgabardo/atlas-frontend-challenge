name: Deploy

# Em push na master: builda a imagem (no CI Linux), publica no GHCR e faz deploy
# por SSH no servidor (compose pull + up + prune). Ver docs/adr/0008.
on:
  push:
    branches: [master]
    paths-ignore: # mudanças só de documentação não redeployam
      - '**.md'
      - 'docs/**'
  workflow_dispatch: # permite disparar manualmente pela aba Actions

concurrency:
  group: deploy-production
  cancel-in-progress: false # nunca abortar um deploy no meio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push no GHCR via GITHUB_TOKEN (sem PAT)
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$SSH_KEY"
          ssh -i "$RUNNER_TEMP/deploy_key" -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "set -e; \
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin; \
             cd /opt/quemfazeventos; \
             docker compose pull; \
             docker compose up -d; \
             docker image prune -f; \
             docker logout ghcr.io"

      - name: Smoke test (health)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/deploy_key" <<< "$SSH_KEY"
          ssh -i "$RUNNER_TEMP/deploy_key" -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" \
            "for i in \$(seq 1 15); do curl -sf http://127.0.0.1:3000/api/health && exit 0; sleep 2; done; echo 'health falhou'; exit 1"
